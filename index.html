<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scholarship Finder</title>
  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>
  <header>
    <h1>Military Student Scholarships</h1>
    <p>Search and filter external scholarship opportunities.</p>
  </header>

  <section class="filters">
    <input id="searchInput" type="text" placeholder="Search by any keyword" />

    <select id="statusFilter">
      <option value="">All Statuses</option>
      <option value="Open">Open</option>
      <option value="Closed">Closed</option>
      <option value="Rolling">Rolling</option>
      <option value="Waiting for dates">Waiting for dates</option>
    </select>

  <div class="date-filter">
  <span>Deadline:</span>
  <input id="fromDate" type="date" />
       <span>to</span>
  <input id="toDate" type="date" />
</div>

    <button id="clearBtn">Clear Filters</button>
    <button id="downloadBtn">Download Results</button>
  </section>

  <p id="resultCount"></p>

  <main id="scholarshipList"></main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
